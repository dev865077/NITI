name: v0.1 validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: v0-1-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-harness:
    name: TypeScript deterministic harness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run v0.1 verifier for deterministic harness
        run: npm run v0.1:verify -- --skip-ada --skip-spark --artifacts-dir v0-1-node-artifacts

      - name: Upload v0.1 smoke transcript
        uses: actions/upload-artifact@v4
        with:
          name: v0-1-cdlc-smoke-transcript
          path: v0-1-node-artifacts/cdlc-smoke-transcript.json
          if-no-files-found: error

  ada-manifest:
    name: Ada manifest validator
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install GNAT and GPRbuild
        run: |
          sudo apt-get update
          sudo apt-get install -y gnat gprbuild

      - name: Run v0.1 verifier for Ada manifest validator
        run: npm run v0.1:verify -- --skip-node --skip-spark --artifacts-dir v0-1-ada-artifacts

  spark-regression:
    name: SPARK proof regression
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Alire
        uses: alire-project/setup-alire@v5

      - name: Install SPARK toolchain
        run: |
          set -euo pipefail
          alr --version
          alr toolchain --select gnat_native gprbuild
          mkdir -p /tmp/niti-spark-tools
          cd /tmp/niti-spark-tools
          cat > alire.toml <<'TOML'
          name = "niti_spark_tools"
          description = "CI-only SPARK proof tool workspace for NITI"
          version = "0.1.0-dev"
          licenses = "ISC"
          authors = ["NITI contributors"]
          maintainers = ["NITI contributors <ci@example.invalid>"]
          maintainers-logins = ["dev865077"]

          [[depends-on]]
          gnatprove = "^15.1.0"
          TOML
          alr update
          eval "$(alr printenv)"
          SPARK_INCLUDE_DIR="$(find "$HOME" -path '*/include/spark' -type d | head -n 1)"
          if [ -z "$SPARK_INCLUDE_DIR" ]; then
            echo "Could not find SPARK include directory in Alire toolchain."
            exit 1
          fi
          echo "SPARK_INCLUDE_DIR=$SPARK_INCLUDE_DIR" >> "$GITHUB_ENV"
          echo "SPARK include dir: $SPARK_INCLUDE_DIR"
          gnatprove --version

      - name: Run v0.1 verifier for core cDLC SPARK proofs
        run: |
          set -euo pipefail
          cd /tmp/niti-spark-tools
          eval "$(alr printenv)"
          cd "$GITHUB_WORKSPACE"
          scripts/run-v0.1.sh --skip-node --skip-ada --artifacts-dir v0-1-spark-artifacts
