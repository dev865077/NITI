<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2.5; rx: 12; }
      .muted { fill: #f3f4f6; stroke: #374151; stroke-width: 2; rx: 12; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 24px; fill: #111827; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrow); fill: none; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="45" y="70" width="210" height="100" class="box"/>
  <text x="150" y="115" text-anchor="middle" class="text">Alice</text>
  <text x="150" y="145" text-anchor="middle" class="small">contraparte A</text>

  <rect x="45" y="250" width="210" height="100" class="box"/>
  <text x="150" y="295" text-anchor="middle" class="text">Bob</text>
  <text x="150" y="325" text-anchor="middle" class="small">contraparte B</text>

  <rect x="445" y="70" width="230" height="100" class="muted"/>
  <text x="560" y="115" text-anchor="middle" class="text">Oraculo</text>
  <text x="560" y="145" text-anchor="middle" class="small">assina o evento</text>

  <rect x="445" y="250" width="230" height="100" class="muted"/>
  <text x="560" y="295" text-anchor="middle" class="text">Nostr</text>
  <text x="560" y="325" text-anchor="middle" class="small">descoberta e mensagens</text>

  <rect x="845" y="160" width="210" height="100" class="box"/>
  <text x="950" y="205" text-anchor="middle" class="text">Bitcoin</text>
  <text x="950" y="235" text-anchor="middle" class="small">DLC / CET / Bridge</text>

  <path d="M255 120 C330 120 360 120 445 120" class="arrow"/>
  <path d="M255 300 C330 300 360 300 445 300" class="arrow"/>
  <path d="M675 120 C760 120 800 155 845 190" class="arrow"/>
  <path d="M675 300 C760 300 800 265 845 230" class="arrow"/>
  <path d="M150 170 C150 205 150 215 150 250" class="arrow"/>

  <text x="350" y="102" text-anchor="middle" class="small">escolha de oraculo</text>
  <text x="350" y="282" text-anchor="middle" class="small">pareamento</text>
  <text x="760" y="112" text-anchor="middle" class="small">atestado</text>
  <text x="760" y="316" text-anchor="middle" class="small">coordenacao</text>
</svg>
